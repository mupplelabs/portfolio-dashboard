version: '3.8'

services:
  streamlit-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio-dashboard
    ports:
      - "8501:8501"
    volumes:
      # This bind mount maps your local directory to the /app directory in the container.
      # It allows you to edit app.py locally and see the changes live without rebuilding!
      - .:/app
    environment:
      # Prevent python from writing pyc files to disc
      - PYTHONDONTWRITEBYTECODE=1
      # Prevent python from buffering stdout and stderr
      - PYTHONUNBUFFERED=1
      # LLM API Keys and Endpoints (Defaults)
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY:-}
      - LOCAL_LLM_URL=${LOCAL_LLM_URL:-http://localhost:11434/v1}
      - LOCAL_LLM_KEY=${LOCAL_LLM_KEY:-}
    restart: unless-stopped
