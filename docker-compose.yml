services:
  investiq-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: investiq
    ports:
      - "8080:8000"
    # volumes:
    #   - .:/app  # Disable volume mount in production so the built container code runs
    env_file:
      - .env
    environment:
      # Prevent python from writing pyc files to disc
      - PYTHONDONTWRITEBYTECODE=1
      # Prevent python from buffering stdout and stderr
      - PYTHONUNBUFFERED=1
      # Explicitly declared for Synology Container Manager GUI parsing
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY:-}
      - LOCAL_LLM_URL=${LOCAL_LLM_URL:-http://localhost:11434/v1}
      - LOCAL_LLM_KEY=${LOCAL_LLM_KEY:-}
      - FMP_API_KEY=${FMP_API_KEY:-}
    restart: unless-stopped
